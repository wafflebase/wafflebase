name: Publish CLI to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Tag or commit to publish (e.g. v0.3.7)
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI (and workspace deps)
        run: pnpm --filter @wafflebase/cli... build

      - name: Run CLI tests
        run: pnpm --filter @wafflebase/cli test

      - name: Publish to npm
        run: pnpm --filter @wafflebase/cli publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
