# Ready gate, automated arm: when CI succeeds on an agent-authored branch,
# attempt to promote its draft PR to "ready for human review" via
# scripts/agent/mark-ready.mjs. The script only promotes when ALL gates hold
# (CI evidence green + self-review clean + AI disclosure); otherwise it exits 1
# and we treat that as "not ready yet" (a no-op), leaving the PR a draft.
#
# Same CI-retrigger caveat as agent-iterate-ci.yml: this fires on the CI
# `workflow_run` that runs against the agent's commits, which requires the fix
# commits to have been pushed with an identity that triggers workflows (the
# Claude GitHub App token / a PAT), not the default GITHUB_TOKEN.
name: Agent Mark Ready

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  promote:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'agent/')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: agent-mark-ready-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4 # default branch — we only need the script

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Resolve PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branch}`,
            });
            const pr = prs.data[0];
            if (!pr) {
              core.info('No open PR for this branch; nothing to promote.');
              core.setOutput('number', '');
              return;
            }
            core.setOutput('number', String(pr.number));

      - name: Run ready gate
        if: steps.pr.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.number }}
        run: |
          set +e
          node ./scripts/agent/mark-ready.mjs "$PR" --promote
          code=$?
          set -e
          # exit 0 = promoted, exit 1 = gates not yet satisfied (leave as draft),
          # exit 2 = usage/tooling error (fail the job so it is visible).
          if [ "$code" -eq 2 ]; then
            echo "mark-ready.mjs failed with a tooling error." >&2
            exit 2
          fi
          if [ "$code" -eq 1 ]; then
            echo "PR #$PR is not ready yet; leaving it as a draft."
          fi
