# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  verify-self:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Self-Contained Lane
        run: pnpm verify:self

      - name: Collect coverage (sheets)
        run: pnpm --filter @wafflebase/sheets exec vitest run --coverage

      - name: Collect coverage (cli)
        run: pnpm --filter @wafflebase/cli exec vitest run --coverage

      - name: Collect coverage (docs)
        run: pnpm --filter @wafflebase/docs exec vitest run --coverage

      - name: Collect coverage (backend)
        run: pnpm --filter @wafflebase/backend test:cov
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: >-
            packages/sheets/coverage/lcov.info,
            packages/cli/coverage/lcov.info,
            packages/docs/coverage/lcov.info,
            packages/backend/coverage/lcov.info
          flags: sheets,cli,docs,backend
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload harness reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-reports
          path: .harness-reports/
          include-hidden-files: true
          retention-days: 14

      - name: Post verification summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.harness-reports/summary.json';
            let body = '## Verification: verify:self\n\n';
            if (!fs.existsSync(path)) {
              body += '> Report not generated — verify:self may have crashed before producing output.\n';
            } else {
              const summary = JSON.parse(fs.readFileSync(path, 'utf8'));
              const icon = summary.overall === 'pass' ? '✅' : '❌';
              body += `**Result:** ${icon} ${summary.overall.toUpperCase()} in ${(summary.totalDurationMs / 1000).toFixed(1)}s\n\n`;
              body += '| Lane | Status | Duration |\n|---|---|---|\n';
              for (const lane of summary.lanes) {
                const s = lane.status === 'pass' ? '✅' : lane.status === 'fail' ? '❌' : '⏭️';
                const dur = lane.durationMs > 0 ? `${(lane.durationMs / 1000).toFixed(1)}s` : '—';
                body += `| ${lane.lane} | ${s} ${lane.status} | ${dur} |\n`;
              }
            }
            body += '\n---\n*⏳ verify:integration pending...*\n';
            const marker = '<!-- harness-verification -->';
            body = marker + '\n' + body;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  verify-browser:
    runs-on: ubuntu-latest
    needs: verify-self

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Docker image
        run: docker build -t wafflebase-playwright -f Dockerfile.playwright .

      - name: Run browser tests in Docker
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD:/workspace" \
            -e WAFFLEBASE_DOCKER_BROWSER=true \
            wafflebase-playwright

      - name: Upload actual screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-visual-actual
          path: packages/frontend/tests/visual/baselines/*.actual.png
          retention-days: 14

  verify-integration:
    runs-on: ubuntu-latest
    needs: verify-self
    env:
      DATABASE_URL: postgresql://wafflebase:wafflebase@localhost:5432/wafflebase
      DATASOURCE_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      RUN_DB_INTEGRATION_TESTS: "true"
      # Pair with the Yorkie service below to unlock the
      # `docs-tree-attached` and `docs-cli-roundtrip` e2e specs that
      # need a real Yorkie server. Locally these are gated the same
      # way (`docker compose up -d` + this env var); CI matches that
      # contract instead of skipping them.
      RUN_YORKIE_INTEGRATION_TESTS: "true"
      YORKIE_RPC_ADDR: http://localhost:8080
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wafflebase
          POSTGRES_PASSWORD: wafflebase
          POSTGRES_DB: wafflebase
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wafflebase -d wafflebase"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Yorkie is intentionally NOT declared as a `service:` here —
      # GitHub Actions' service map has no `command:` field, and the
      # `yorkieteam/yorkie` image's entrypoint is just `["yorkie"]`
      # (no default CMD), so the server subcommand has to come from
      # `docker run`'s positional args. We start it as a background
      # step below; the wait-for-port step makes the lifecycle as
      # well-behaved as a real service.

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages the CLI imports at runtime
        # `verify:integration` spawns the CLI via `tsx packages/cli/src/bin.ts`.
        # The CLI eagerly imports `@wafflebase/docs` and `@wafflebase/slides/node`,
        # both of which resolve via each package's `exports` field to a
        # built file under `dist/`. The `verify-self` job builds these on
        # its own runner; `verify-integration` is a separate runner that
        # starts without those artifacts, so we rebuild them here.
        run: |
          pnpm --filter @wafflebase/docs build
          pnpm slides build

      - name: Start Yorkie server
        run: |
          # Match the image and CLI args used by `docker-compose.yaml`
          # so local + CI behavior stays aligned. `--pprof-enabled`
          # mirrors local dev; the perf overhead is negligible for a
          # short integration run.
          docker run -d --name yorkie \
            -p 8080:8080 -p 8081:8081 \
            yorkieteam/yorkie:latest server --pprof-enabled

      - name: Wait for Yorkie to accept connections on :8080
        run: |
          # The container starts before this step but Yorkie's gRPC
          # listener takes a couple seconds to bind. Poll until the
          # port answers (or fail after 30 attempts × 1s = 30s).
          for i in $(seq 1 30); do
            if nc -z localhost 8080; then
              echo "Yorkie is up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Yorkie did not become reachable on :8080" >&2
          docker logs yorkie || true
          exit 1

      - name: Verify Integration Lane
        id: integration
        run: pnpm verify:integration

      - name: Yorkie logs on failure
        if: failure() && steps.integration.outcome == 'failure'
        run: docker logs yorkie

      - name: Update PR comment with integration result
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- harness-verification -->';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (!existing) return;
            const passed = '${{ steps.integration.outcome }}' === 'success';
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'PASS' : 'FAIL';
            const updated = existing.body.replace(
              /\n---\n\*⏳ verify:integration pending\.\.\.\*\n?/,
              `\n\n## Verification: verify:integration\n\n**Result:** ${icon} ${status}\n`
            );
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: updated,
            });
