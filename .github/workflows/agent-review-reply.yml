# Develop-review loop, review arm: when a trusted human mentions "@claude" on an
# agent-authored PR (top-level comment or inline review comment), Claude Code
# evaluates the finding, pushes a fix commit if warranted, and replies inside the
# thread per CONTRIBUTING.md. It pushes back with reasoning when a finding is
# wrong. It never merges.
name: Agent Review Reply

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write # reply in PR comment threads

jobs:
  reply:
    # An "@claude" mention from a trusted author on a PR (issue_comment fires for
    # PRs too — gate on github.event.issue.pull_request), or an inline review
    # comment on a PR. Restricted to agent-authored branches is enforced by the
    # checkout + the agent only acting on its own PR context.
    if: >-
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request &&
         contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' &&
         contains(github.event.comment.body, '@claude'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: agent
    # Job-level concurrency so an unrelated comment that fails the `if` is
    # skipped without occupying the group. Queue (don't cancel) so multiple
    # review replies on the same PR are handled in order.
    concurrency:
      group: agent-review-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    env:
      WAFFLEBASE_AGENT_AUTONOMOUS: "true"
    steps:
      - name: Resolve PR head branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const num = context.payload.issue?.number || context.payload.pull_request?.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: num,
            });
            core.setOutput('ref', pr.head.ref);
            core.setOutput('is_agent', String(pr.head.ref.startsWith('agent/')));

      - name: Skip non-agent PRs
        if: steps.pr.outputs.is_agent != 'true'
        run: echo "Not an agent-authored branch; leaving this to the humans." && exit 0

      - uses: actions/checkout@v4
        if: steps.pr.outputs.is_agent == 'true'
        with:
          ref: ${{ steps.pr.outputs.ref }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        if: steps.pr.outputs.is_agent == 'true'

      - uses: actions/setup-node@v4
        if: steps.pr.outputs.is_agent == 'true'
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        if: steps.pr.outputs.is_agent == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run Claude Code
        if: steps.pr.outputs.is_agent == 'true'
        # Pin to a released tag/SHA before enabling. This uses the action's
        # native @claude mention handling, which already has the thread context.
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: >-
            --max-turns 40
            --model claude-opus-4-8
            --allowedTools "Bash,Read,Edit,Write,Glob,Grep"
